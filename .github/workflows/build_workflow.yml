name: Build and Sync tls-client Cores & Publish to PyPI

on:
  push:
    branches: [master, main]
    paths:
      - 'cffi_binding/**'
      - 'tls_client/**'
    tags:
      - 'v*' # 🌟 关键新增：当推送版本标签（如 v1.0.0）时触发 PyPI 发布
  workflow_dispatch:

permissions:
  contents: write
  id-token: write # 🌟 关键新增：PyPI 官方 Trusted Publishing 认证所需的 OIDC 权限

jobs:
  # -----------------------------------------------------------------------
  # 1. Build native and macOS architectures (64-bit platforms)
  # -----------------------------------------------------------------------
  build-native:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: .so
            cgo_ldflags: "-Wl,--gc-sections -Wl,-z,relro -Wl,-z,now"
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: .dylib
            cgo_ldflags: "-Wl,-dead_strip"
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: .dylib
            cgo_ldflags: "-Wl,-dead_strip"
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .dll
            cgo_ldflags: "-Wl,--gc-sections"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build Core
        working-directory: cffi_binding
        shell: bash
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: "-Os -g0 -fdata-sections -ffunction-sections -fno-asynchronous-unwind-tables"
          CGO_LDFLAGS: ${{ matrix.cgo_ldflags }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -buildmode=c-shared \
                   -buildvcs=false \
                   -trimpath \
                   -tags="netgo osusergo" \
                   -ldflags="-s -w" \
                   -o "dist/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Strip Binary Safely
        shell: bash
        run: |
          TARGET="cffi_binding/dist/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            strip -x "$TARGET" || true
          else
            strip --strip-unneeded "$TARGET" || true
          fi

      - name: Upload Intermediary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cffi_binding/dist/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # -----------------------------------------------------------------------
  # 2. Cross-compile Windows 32-bit (386) on Linux
  # -----------------------------------------------------------------------
  build-windows-386-cross:
    name: Cross Windows-386
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install MinGW 32-bit Cross Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686

      - name: Build Core
        working-directory: cffi_binding
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: "-Os -g0 -fdata-sections -ffunction-sections -fno-asynchronous-unwind-tables"
          CGO_LDFLAGS: "-Wl,--gc-sections"
          GOOS: windows
          GOARCH: "386"
          CC: i686-w64-mingw32-gcc
        run: |
          mkdir -p dist
          go build -buildmode=c-shared \
                   -buildvcs=false \
                   -trimpath \
                   -tags="netgo osusergo" \
                   -ldflags="-s -w" \
                   -o "dist/tls-client-windows-386.dll" .

      - name: Strip Windows 32-bit Binary
        run: |
          i686-w64-mingw32-strip --strip-unneeded cffi_binding/dist/tls-client-windows-386.dll || true

      - name: Upload Intermediary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-windows-386
          path: cffi_binding/dist/tls-client-windows-386.dll

  # -----------------------------------------------------------------------
  # 3. Cross-compile Linux ARM & 386 architectures (glibc based)
  # -----------------------------------------------------------------------
  build-linux-cross:
    name: Cross Linux-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm
            goarm: "7"
            compiler_pkg: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            strip_cmd: arm-linux-gnueabihf-strip
            ext: .so
          - goarch: arm64
            goarm: ""
            compiler_pkg: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            strip_cmd: aarch64-linux-gnu-strip
            ext: .so
          - goarch: "386"
            goarm: ""
            compiler_pkg: gcc-multilib
            cc: gcc
            strip_cmd: strip
            ext: .so

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler_pkg }}

      - name: Build Core
        working-directory: cffi_binding
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: "-Os -g0 -fdata-sections -ffunction-sections -fno-asynchronous-unwind-tables"
          CGO_LDFLAGS: "-Wl,--gc-sections -Wl,-z,relro -Wl,-z,now"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p dist
          go build -buildmode=c-shared \
                   -buildvcs=false \
                   -trimpath \
                   -tags="netgo osusergo" \
                   -ldflags="-s -w" \
                   -o "dist/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Strip Binary Safely
        run: |
          ${{ matrix.strip_cmd }} --strip-unneeded "cffi_binding/dist/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }}" || true

      - name: Upload Intermediary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-linux-${{ matrix.goarch }}
          path: cffi_binding/dist/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }}

  # -----------------------------------------------------------------------
  # 4. Native-compile for Alpine Linux (musl libc based)
  # -----------------------------------------------------------------------
  build-alpine:
    name: Build Alpine-amd64 (musl)
    runs-on: ubuntu-latest
    container:
      image: golang:1.24-alpine
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: apk add --no-cache gcc musl-dev git binutils

      - name: Build Core
        working-directory: cffi_binding
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: "-Os -g0 -fdata-sections -ffunction-sections"
          CGO_LDFLAGS: "-Wl,--gc-sections"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -buildmode=c-shared \
                   -buildvcs=false \
                   -trimpath \
                   -tags="netgo osusergo musl" \
                   -ldflags="-s -w" \
                   -o "dist/tls-client-alpine-amd64.so" .

      - name: Strip Binary
        run: strip --strip-unneeded "cffi_binding/dist/tls-client-alpine-amd64.so" || true

      - name: Upload Intermediary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-alpine-amd64
          path: cffi_binding/dist/tls-client-alpine-amd64.so

  # -----------------------------------------------------------------------
  # 5. Sync Binaries, Pack Wheel and Publish to PyPI
  # -----------------------------------------------------------------------
  sync-and-publish:
    name: Sync Cores & Publish to PyPI
    needs: [build-native, build-windows-386-cross, build-linux-cross, build-alpine]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # 使用稳定的现代 Python 构建通用 Wheel 包

      - name: Create Target Binary Directory
        run: mkdir -p tls_client/bin

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: tmp_artifacts

      - name: Organize and Move Binaries
        run: |
          find tmp_artifacts/ -type f \( -name "*.so" -o -name "*.dll" -o -name "*.dylib" \) -exec cp {} tls_client/bin/ \;
          echo "=== Binaries in tls_client/bin/ ==="
          ls -la tls_client/bin/

      # 🌟 修复：仅在常规 master/main 分支推送时才同步回 GitHub，规避 Tag 冲突
      - name: Auto Commit and Push back to Repo
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated cross-compiled cores synchronization [skip ci]"
          branch: ${{ github.head_ref || github.ref_name }}
          file_pattern: 'tls_client/bin/*'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      # 🌟 新增：打包 Python 项目
      - name: Install Build Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build Wheel and Source Tarball
        run: python -m build

      # 🌟 新增：自动发布到 PyPI 社区
      # 触发机制：当你推送 v* 格式的 Tag（例如 v1.0.0）或者在 GitHub 手动点击 workflow_dispatch 运行时触发
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@release/v1
