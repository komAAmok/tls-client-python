name: Build Platform-Specific Wheels & Publish to PyPI

on:
  push:
    branches: [master, main]
    paths:
      - 'cffi_binding/**'
      - 'tls_client/**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  # -----------------------------------------------------------------------
  # 1. Build and Pack Native Platforms (Linux-amd64, macOS, Windows-amd64)
  # -----------------------------------------------------------------------
  build-native:
    name: Build & Pack ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: .so
            cgo_ldflags: "-Wl,--gc-sections -Wl,-z,relro -Wl,-z,now"
            plat: "manylinux2014_x86_64"
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: .dylib
            cgo_ldflags: "-Wl,-dead_strip"
            plat: "macosx_10_9_x86_64"
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: .dylib
            cgo_ldflags: "-Wl,-dead_strip"
            plat: "macosx_11_0_arm64"
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .dll
            cgo_ldflags: "-Wl,--gc-sections"
            plat: "win_amd64"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install UPX (Linux/Windows)
        if: matrix.goos != 'darwin'
        shell: bash
        run: |
          if [ "${{ matrix.goos }}" = "linux" ]; then
            sudo apt-get update && sudo apt-get install -y upx-ucl
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            choco install upx --no-progress
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Core
        working-directory: cffi_binding
        shell: bash
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: "-Os -g0 -fdata-sections -ffunction-sections -fno-asynchronous-unwind-tables -fno-ident"
          CGO_LDFLAGS: ${{ matrix.cgo_ldflags }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../tls_client/bin
          # 🌟 采用带系统/架构后缀的命名规则，确保放回 Git 时不冲突
          go build -buildmode=c-shared \
                   -buildvcs=false \
                   -trimpath \
                   -tags="netgo osusergo" \
                   -ldflags="-s -w" \
                   -o "../tls_client/bin/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Strip Binary Safely
        shell: bash
        run: |
          TARGET="tls_client/bin/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            strip -x "$TARGET" || true
          else
            strip -R .comment -R .note.GNU-stack --strip-unneeded "$TARGET" || true
          fi

      - name: Compress with UPX (Non-Mac)
        if: matrix.goos != 'darwin'
        shell: bash
        run: |
          upx --best --lzma "tls_client/bin/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" || true

      - name: Build Wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel -C--build-option=--plat-name=${{ matrix.plat }}

      - name: Upload Platform Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.whl

      # 🌟 新增：独立上传编译后的裸二进制，以便最后合并同步回 GitHub
      - name: Upload Raw Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tls_client/bin/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # -----------------------------------------------------------------------
  # 2. Cross-compile and Pack Windows 32-bit (386) on Linux
  # -----------------------------------------------------------------------
  build-windows-386-cross:
    name: Cross Windows-386
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MinGW 32-bit Cross Compiler & UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-i686 upx-ucl

      - name: Build Core
        working-directory: cffi_binding
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: "-Os -g0 -fdata-sections -ffunction-sections -fno-asynchronous-unwind-tables -fno-ident"
          CGO_LDFLAGS: "-Wl,--gc-sections"
          GOOS: windows
          GOARCH: "386"
          CC: i686-w64-mingw32-gcc
        run: |
          mkdir -p ../tls_client/bin
          go build -buildmode=c-shared \
                   -buildvcs=false \
                   -trimpath \
                   -tags="netgo osusergo" \
                   -ldflags="-s -w" \
                   -o "../tls_client/bin/tls-client-windows-386.dll" .

      - name: Strip & Compress
        run: |
          i686-w64-mingw32-strip --strip-unneeded tls_client/bin/tls-client-windows-386.dll || true
          upx --best --lzma tls_client/bin/tls-client-windows-386.dll || true

      - name: Build Wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel -C--build-option=--plat-name=win32

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-windows-386
          path: dist/*.whl

      - name: Upload Raw Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-windows-386
          path: tls_client/bin/tls-client-windows-386.dll

  # -----------------------------------------------------------------------
  # 3. Cross-compile and Pack Linux ARM & 386 (glibc based)
  # -----------------------------------------------------------------------
  build-linux-cross:
    name: Cross Linux-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm
            goarm: "7"
            compiler_pkg: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            strip_cmd: arm-linux-gnueabihf-strip
            plat: manylinux2014_armv7l
          - goarch: arm64
            goarm: ""
            compiler_pkg: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            strip_cmd: aarch64-linux-gnu-strip
            plat: manylinux2014_aarch64
          - goarch: "386"
            goarm: ""
            compiler_pkg: gcc-multilib
            cc: gcc
            strip_cmd: strip
            plat: manylinux2014_i686

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Cross-Compiler & UPX
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler_pkg }} upx-ucl

      - name: Build Core
        working-directory: cffi_binding
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: "-Os -g0 -fdata-sections -ffunction-sections -fno-asynchronous-unwind-tables -fno-ident"
          CGO_LDFLAGS: "-Wl,--gc-sections -Wl,-z,relro -Wl,-z,now"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p ../tls_client/bin
          go build -buildmode=c-shared \
                   -buildvcs=false \
                   -trimpath \
                   -tags="netgo osusergo" \
                   -ldflags="-s -w" \
                   -o "../tls_client/bin/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Strip & Compress
        run: |
          ${{ matrix.strip_cmd }} -R .comment -R .note.GNU-stack --strip-unneeded tls_client/bin/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }} || true
          upx --best --lzma tls_client/bin/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }} || true

      - name: Build Wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel -C--build-option=--plat-name=${{ matrix.plat }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-linux-${{ matrix.goarch }}
          path: dist/*.whl

      - name: Upload Raw Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-linux-${{ matrix.goarch }}
          path: tls_client/bin/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }}

  # -----------------------------------------------------------------------
  # 4. Native-compile and Pack for Alpine Linux (musl libc based)
  # -----------------------------------------------------------------------
  build-alpine:
    name: Build Alpine-amd64 (musl)
    runs-on: ubuntu-latest
    container:
      image: golang:1.24-alpine
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: apk add --no-cache gcc musl-dev git binutils upx python3 py3-pip py3-build

      - name: Build Core
        working-directory: cffi_binding
        env:
          CGO_ENABLED: 1
          CGO_CFLAGS: "-Os -g0 -fdata-sections -ffunction-sections -fno-ident"
          CGO_LDFLAGS: "-Wl,--gc-sections"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p ../tls_client/bin
          go build -buildmode=c-shared \
                   -buildvcs=false \
                   -trimpath \
                   -tags="netgo osusergo musl" \
                   -ldflags="-s -w" \
                   -o "../tls_client/bin/tls-client-linux-amd64-musl.so" .

      - name: Strip & Compress
        run: |
          strip -R .comment -R .note.GNU-stack --strip-unneeded tls_client/bin/tls-client-linux-amd64-musl.so || true
          upx --best --lzma tls_client/bin/tls-client-linux-amd64-musl.so || true

      - name: Build Wheel
        run: |
          python3 -m build --wheel -C--build-option=--plat-name=musllinux_1_1_x86_64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-alpine-amd64
          path: dist/*.whl

      - name: Upload Raw Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-alpine-amd64
          path: tls_client/bin/tls-client-linux-amd64-musl.so

  # -----------------------------------------------------------------------
  # 5. Build Source Distribution & Publish All Wheels to PyPI
  # -----------------------------------------------------------------------
  sync-and-publish:
    name: Collect, Sync to GitHub & Publish to PyPI
    needs: [build-native, build-windows-386-cross, build-linux-cross, build-alpine]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 确保拥有写权限以 push 核心库

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Target Directories
        run: |
          mkdir -p dist
          mkdir -p tls_client/bin

      # 下载所有的平台特定的 .whl 轮子文件和裸二进制文件
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: tmp_artifacts

      # 🌟 将多系统的编译二进制和轮子分别归类整理
      - name: Organize Wheels & Binaries
        run: |
          # 归类所有平台专属 Wheels 包
          find tmp_artifacts/ -type f -name "*.whl" -exec cp {} dist/ \;
          # 归类所有平台专属裸二进制动态库到 tls_client/bin/
          find tmp_artifacts/ -type f -name "tls-client-*" -exec cp {} tls_client/bin/ \;
          
          echo "=== Collected Binaries in tls_client/bin/ ==="
          ls -lh tls_client/bin/
          echo "=== Collected Wheels in dist/ ==="
          ls -lh dist/

      # 🌟 新增：自动将编译好的动态库同步并提交推送回你的 GitHub 仓库（仅在常规分支推送时执行，规避 Tag 冲突）
      - name: Auto Commit and Push back to GitHub
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated compilation of cross-compiled cores [skip ci]"
          branch: ${{ github.head_ref || github.ref_name }}
          file_pattern: 'tls_client/bin/*'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      # 额外生成一个 Source Distribution
      - name: Build Source Tarball
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      # 安全发布至 PyPI
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
