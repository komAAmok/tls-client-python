name: Build and Sync tls-client Cores

on:
  push:
    branches: [master, main]
    paths:
      - 'cffi_binding/**' # 只有当 Go 核心代码或绑定层改变时才触发编译，节约 Actions 额度
  workflow_dispatch:      # 支持手动一键触发

permissions:
  contents: write         # 必须赋予写权限，否则无法自动提交二进制文件回项目路径

jobs:
  # -----------------------------------------------------------------------
  # 1. 编译原生及 macOS 架构
  # -----------------------------------------------------------------------
  build-native:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: .so
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: .dylib
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: .dylib
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .dll

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build Core
        working-directory: cffi_binding
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -buildmode=c-shared -buildvcs=false -o "dist/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Upload Intermediary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cffi_binding/dist/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # -----------------------------------------------------------------------
  # 2. 严格交叉编译 Linux ARM 架构
  # -----------------------------------------------------------------------
  build-linux-cross:
    name: Cross Linux-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm
            goarm: "7"
            compiler_pkg: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            ext: .so
          - goarch: arm64
            goarm: ""
            compiler_pkg: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            ext: .so

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler_pkg }}

      - name: Build Core
        working-directory: cffi_binding
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p dist
          go build -buildmode=c-shared -buildvcs=false -o "dist/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Upload Intermediary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-linux-${{ matrix.goarch }}
          path: cffi_binding/dist/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }}

  # -----------------------------------------------------------------------
  # 3. 核心收拢：自动下载所有编译产物并提交回项目路径
  # -----------------------------------------------------------------------
  sync-to-project-path:
    name: Sync Binaries into Project Path
    needs: [build-native, build-linux-cross]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # 使用原生 Token 即可

      - name: Create Target Binary Directory
        run: mkdir -p cffi_binding/bin

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: tmp_artifacts

      - name: Organize and Move Binaries
        run: |
          # 检索临时目录，将所有编译好的 .so, .dll, .dylib 提取到项目源码的 bin 目录下
          find tmp_artifacts/ -type f \( -name "*.so" -o -name "*.dll" -o -name "*.dylib" \) -exec cp {} cffi_binding/bin/ \;
          echo "=== 移入项目路径下的核心文件列表 ==="
          ls -la cffi_binding/bin/

      - name: Auto Commit and Push back to Repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated cross-compiled cores synchronization [skip ci]"
          branch: ${{ github.head_ref || github.ref_name }}
          file_pattern: 'cffi_binding/bin/*'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
