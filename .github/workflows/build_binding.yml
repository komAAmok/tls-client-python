name: Build tls-client CFFI Bindings

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Linux ------------------------------------------------------
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: .so

          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: .so

          # ---- macOS ------------------------------------------------------
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: .dylib

          - runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: .dylib

          # ---- Windows ----------------------------------------------------
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build shared library
        working-directory: cffi_binding
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -buildmode=c-shared -buildvcs=false -o "dist/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tls-client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cffi_binding/dist/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # Cross-compile Linux variants from a single ubuntu runner
  # -----------------------------------------------------------------------
  build-linux-cross:
    name: Cross ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-armv7
            goarch: arm
            goarm: "7"
            cc: arm-linux-gnueabihf-gcc
            ext: .so

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf

      - name: Build shared library
        working-directory: cffi_binding
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p dist
          go build -buildmode=c-shared -buildvcs=false -o "dist/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tls-client-linux-${{ matrix.goarch }}
          path: cffi_binding/dist/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # Create a single release bundle
  # -----------------------------------------------------------------------
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-linux-cross]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -not -name 'SHA256SUMS' -exec sha256sum {} \; | sort > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          generate_release_notes: true
