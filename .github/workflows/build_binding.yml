name: Build and Sync tls-client Cores

on:
  push:
    branches: [master, main]
    paths:
      - 'cffi_binding/**'
      - 'tls_client/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------------
  # 1. Build native and macOS architectures
  # -----------------------------------------------------------------------
  build-native:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: .so
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: .dylib
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: .dylib
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .dll
          - runner: windows-latest
            goos: windows
            goarch: "386"
            ext: .dll

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Build Core
        working-directory: cffi_binding
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -buildmode=c-shared -buildvcs=false -o "dist/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Upload Intermediary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cffi_binding/dist/tls-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # -----------------------------------------------------------------------
  # 2. Cross-compile Linux ARM architectures
  # -----------------------------------------------------------------------
  build-linux-cross:
    name: Cross Linux-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: arm
            goarm: "7"
            compiler_pkg: gcc-arm-linux-gnueabihf
            cc: arm-linux-gnueabihf-gcc
            ext: .so
          - goarch: arm64
            goarm: ""
            compiler_pkg: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            ext: .so
          - goarch: "386"
            goarm: ""
            compiler_pkg: gcc-multilib
            cc: gcc
            ext: .so

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler_pkg }}

      - name: Build Core
        working-directory: cffi_binding
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p dist
          go build -buildmode=c-shared -buildvcs=false -o "dist/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Upload Intermediary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-linux-${{ matrix.goarch }}
          path: cffi_binding/dist/tls-client-linux-${{ matrix.goarch }}${{ matrix.ext }}

  # -----------------------------------------------------------------------
  # 3. Sync: download all artifacts and commit to tls_client/bin/
  # -----------------------------------------------------------------------
  sync-to-project-path:
    name: Sync Binaries into tls_client/bin/
    needs: [build-native, build-linux-cross]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Target Binary Directory
        run: mkdir -p tls_client/bin

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: tmp_artifacts

      - name: Organize and Move Binaries
        run: |
          find tmp_artifacts/ -type f \( -name "*.so" -o -name "*.dll" -o -name "*.dylib" \) -exec cp {} tls_client/bin/ \;
          echo "=== Binaries in tls_client/bin/ ==="
          ls -la tls_client/bin/

      - name: Auto Commit and Push back to Repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated cross-compiled cores synchronization [skip ci]"
          branch: ${{ github.head_ref || github.ref_name }}
          file_pattern: 'tls_client/bin/*'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
